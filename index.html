<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Full Screen Player (Fixed)</title>
    <style>
        /* 화면 여백을 완전히 없애고 스크롤 바를 숨깁니다 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 영상을 감싸는 박스를 화면 전체 크기로 고정합니다 */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 플레이어(iframe) 자체를 무조건 화면 가로세로 100%로 지정하여 
          영상이 안 보이는 오류를 원천 차단합니다.
        */
        #player {
            width: 100% !important;
            height: 100% !important;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="player"></div>
    </div>

    <script>
        // 1. YouTube Player API 로드
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // 2. 플레이어 생성 및 설정
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'HgewvBTOJwU',
                playerVars: {
                    'autoplay': 1,            // 자동 재생
                    'mute': 1,                // 브라우저 차단 방지용 음소거 (필수)
                    'loop': 1,                // 반복 재생
                    'playlist': 'HgewvBTOJwU', // 반복 재생용 플레이리스트 지정
                    'controls': 1,            // 하단 컨트롤바 노출 (마우스 올리면 표시)
                    'rel': 0,                 // 종료 후 추천 영상 안 뜨게
                    'modestbranding': 1       // 유튜브 로고 최소화
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        // 3. 준비 완료 시 자동 재생 시작 명령
        function onPlayerReady(event) {
            event.target.playVideo();
        }
    </script>

</body>
</html>
